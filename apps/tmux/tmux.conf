# ============================================================================
# GENERAL
# ============================================================================
set -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -g history-limit 50000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g status-interval 5

# ============================================================================
# PREFIX
# ============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ============================================================================
# SPLITS
# ============================================================================
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current path
bind c new-window -c "#{pane_current_path}"

# ============================================================================
# NAVIGATION (vim-tmux-navigator)
# ============================================================================
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Resize panes with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation
bind -r C-p previous-window
bind -r C-n next-window

# ============================================================================
# COPY MODE (vi keys)
# ============================================================================
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H send -X start-of-line
bind -T copy-mode-vi L send -X end-of-line

# ============================================================================
# SESSION MANAGEMENT
# ============================================================================
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" kill-session

# ============================================================================
# SESSIONIZER
# ============================================================================
bind-key -r f run-shell "tmux neww ~/.dotfiles/apps/tmux/tmux-sessionizer.sh"

# ============================================================================
# CHEATSHEET
# ============================================================================
bind-key -r i run-shell "tmux neww ~/.dotfiles/apps/tmux/tmux-cht.sh"


# ============================================================================
# QUICK KILL PANE (no confirmation)
# ============================================================================
bind x kill-pane

# ============================================================================
# RELOAD
# ============================================================================
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ============================================================================
# THEME (catppuccin — auto light/dark based on macOS appearance)
# ============================================================================
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "rounded"

# Status bar
set -g status-position top
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_session}"

# Window tabs
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# ============================================================================
# PLUGINS (TPM)
# ============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'sainnhe/tmux-fzf'

# Resurrect config
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Continuum config
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# ============================================================================
# CATPPUCCIN FLAVOR (dynamic — must be AFTER plugin loads)
# Detect macOS appearance and set flavor: mocha (dark) / latte (light)
# Re-sources catppuccin on each status-interval (5s) to react to OS changes
# ============================================================================
set -g @catppuccin_flavor "mocha"

# ============================================================================
# TPM INIT (keep at the very bottom)
# ============================================================================
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'

# After TPM loads catppuccin, apply the correct flavor and reload theme
run 'FLAVOR=$(~/.dotfiles/apps/tmux/catppuccin-flavor.sh) && \
     tmux set -g @catppuccin_flavor "$FLAVOR" && \
     ~/.tmux/plugins/tmux/catppuccin.tmux'

# Hook: re-evaluate flavor every status-interval cycle
set-hook -g client-focus-in 'run-shell " \
  FLAVOR=$(~/.dotfiles/apps/tmux/catppuccin-flavor.sh); \
  CURRENT=$(tmux show -gv @catppuccin_flavor); \
  if [ \"$FLAVOR\" != \"$CURRENT\" ]; then \
    tmux set -g @catppuccin_flavor $FLAVOR; \
    ~/.tmux/plugins/tmux/catppuccin.tmux; \
  fi"'
